name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-eve-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json

      - name: Install dependencies (librairie)
        run: npm ci

      - name: Build librairie (dist/)
        run: npm run build

      - name: Install dependencies (docs)
        working-directory: docs
        run: npm ci

      - name: Build site documentation
        working-directory: docs
        run: npm run build
        env:
          GITHUB_ACTIONS: "true"
          GITHUB_PAGES: "true"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/dist

      - id: deployment
        uses: actions/deploy-pages@v4
